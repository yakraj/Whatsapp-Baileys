version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: wa-gateway-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whatsapp_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d whatsapp_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: wa-gateway-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/whatsapp_gateway?schema=public
      NEXT_PUBLIC_APP_BASE_URL: http://localhost:3000
      GATEWAY_JWT_SECRET: your-secret-change-me
      # Ensure NODE_ENV is production for the standalone build
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
